<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>リクエストを処理できません - カシラク</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container { text-align: center; padding: 2rem; }
      .status { font-size: 6rem; font-weight: 700; color: #f97316; line-height: 1; }
      .subtitle { font-size: 1.25rem; color: #9ca3af; margin-top: 0.25rem; }
      .title { font-size: 1.5rem; font-weight: 700; color: #111827; margin-top: 1rem; }
      .message { font-size: 0.875rem; color: #6b7280; margin-top: 0.75rem; line-height: 1.6; }
      .link {
        display: inline-block; margin-top: 2rem; padding: 0.75rem 2rem;
        background: #f97316; color: #fff; text-decoration: none;
        border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500;
      }
      .link:hover { background: #ea580c; }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="status">422</p>
      <p class="subtitle">Unprocessable Entity</p>
      <h1 class="title">リクエストを処理できません</h1>
      <p class="message">送信内容に問題がありました。ページを再読み込みしてもう一度お試しください。</p>
      <a href="/" class="link">トップページへ戻る</a>
    </div>
  </body>
</html>
